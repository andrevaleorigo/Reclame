<!-- Biblioteca jsPDF para geração de arquivos PDF - carregamento lazy -->
<script>
    // Variável para controle de carregamento lazy do jsPDF
    let jsPDFLoaded = false;
    let pdfQueue = [];

    function loadJsPDF() {
        return new Promise((resolve, reject) => {
            if (jsPDFLoaded) {
                resolve(window.jspdf);
                return;
            }
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
            script.onload = () => {
                jsPDFLoaded = true;
                resolve(window.jspdf);
            };
            script.onerror = reject;
            document.head.appendChild(script);
        });
    }
</script>

<style>
    /* ==================== ESTILOS GLOBAIS ==================== */

    /* Reset básico para garantir consistência entre navegadores */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* Variáveis CSS para temas (claro/escuro) */
    :root {
        --bg-primary: linear-gradient(135deg, #eef2f7, #d9e2ec);
        --bg-container: rgba(255, 255, 255, 0.95);
        --text-primary: #1f2d3d;
        --text-secondary: #555;
        --accent-color: #6a0dad;
        --btn-primary: #1e5bb8;
        --btn-danger: #e74c3c;
        --btn-danger-hover: #c0392b;
        --btn-secondary: #5dade2;
        --border-color: #e0e0e0;
        --error-color: #e74c3c;
        --success-color: #27ae60;
        --shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }

    /* Tema escuro */
    [data-theme="dark"] {
        --bg-primary: linear-gradient(135deg, #1a1a2e, #16213e);
        --bg-container: rgba(30, 30, 46, 0.95);
        --text-primary: #ffffff;
        --text-secondary: #cccccc;
        --border-color: #444;
        --shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    /* Estilo principal do corpo da página */
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg-primary);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        transition: background 0.3s ease;
    }

    /* Container principal de cada tela */
    .container {
        width: 100%;
        max-width: 600px;
        text-align: center;
        background: var(--bg-container);
        border-radius: 20px;
        padding: 30px;
        box-shadow: var(--shadow);
        transition: all 0.3s ease;
        animation: fadeIn 0.3s ease;
    }

    /* Animações */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
        from { transform: translateY(-50px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }

    /* Título principal */
    h1 {
        font-size: 42px;
        margin-bottom: 10px;
        color: var(--text-primary);
    }

    h1 span {
        color: var(--accent-color);
    }

    /* Subtítulo descritivo */
    .sub {
        color: var(--text-secondary);
        margin-bottom: 30px;
        font-size: 16px;
    }

    /* Estilo base para todos os botões */
    .btn {
        width: 100%;
        max-width: 300px;
        padding: 15px;
        margin: 10px auto;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
        display: block;
        transition: all 0.3s ease;
        font-weight: 600;
        border: none;
        position: relative;
        overflow: hidden;
    }

    /* Efeito ripple nos botões */
    .btn::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.5);
        transform: translate(-50%, -50%);
        transition: width 0.3s, height 0.3s;
    }

    .btn:active::after {
        width: 200px;
        height: 200px;
    }

    /* Estilo específico para botões anônimos/primários */
    .anonimo {
        background-color: var(--btn-primary);
        color: white;
        border: 2px solid var(--btn-primary);
    }

    /* Efeito hover para botões anônimos */
    .anonimo:hover {
        background-color: white;
        color: var(--btn-primary);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    /* Botão desabilitado */
    .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    /* Botão Sair fixo no canto inferior direito */
    .sair {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: var(--btn-danger);
        color: white;
        padding: 12px 25px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        z-index: 1000;
    }

    .sair:hover {
        background-color: var(--btn-danger-hover);
        transform: scale(1.05);
    }

    /* Botão Voltar fixo no canto inferior esquerdo */
    .voltar {
        position: fixed;
        bottom: 20px;
        left: 20px;
        background-color: var(--btn-secondary);
        color: white;
        padding: 12px 25px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        display: none;
        z-index: 1000;
    }

    .voltar:hover {
        background-color: #3498db;
        transform: scale(1.05);
    }

    /* Botão de tema (modo escuro/claro) */
    .theme-toggle {
        position: fixed;
        top: 20px;
        right: 20px;
        background-color: var(--bg-container);
        color: var(--text-primary);
        border: 2px solid var(--border-color);
        border-radius: 50%;
        width: 45px;
        height: 45px;
        cursor: pointer;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        z-index: 1000;
    }

    .theme-toggle:hover {
        transform: scale(1.1);
    }

    /* Modal de aviso */
    .modal {
        display: none;
        position: fixed;
        z-index: 2000;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        justify-content: center;
        align-items: center;
        top: 0;
        left: 0;
    }

    .modal-content {
        background: var(--bg-container);
        color: var(--text-primary);
        padding: 30px;
        border-radius: 12px;
        width: 90%;
        max-width: 500px;
        text-align: center;
        animation: slideIn 0.3s ease;
    }

    .modal-buttons {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        justify-content: center;
    }

    .confirmar {
        flex: 1;
        padding: 12px;
        border-radius: 8px;
        border: none;
        background: var(--btn-primary);
        color: white;
        cursor: pointer;
        font-weight: 600;
    }

    .cancelar {
        flex: 1;
        padding: 12px;
        border-radius: 8px;
        border: none;
        background: #ccc;
        cursor: pointer;
        font-weight: 600;
    }

    /* Toast notification */
    .toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        background-color: var(--success-color);
        color: white;
        padding: 12px 24px;
        border-radius: 8px;
        z-index: 1500;
        animation: slideIn 0.3s ease;
        font-weight: 500;
        box-shadow: var(--shadow);
    }

    .toast.error {
        background-color: var(--error-color);
    }

    /* Estilos para elementos de formulário */
    input, select, textarea {
        width: 100%;
        max-width: 400px;
        padding: 12px;
        margin-top: 8px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 2px solid var(--border-color);
        font-size: 14px;
        transition: border-color 0.3s ease;
        background: var(--bg-container);
        color: var(--text-primary);
    }

    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: var(--btn-primary);
        box-shadow: 0 0 5px rgba(30, 91, 184, 0.3);
    }

    input:invalid, select:invalid {
        border-color: var(--error-color);
    }

    textarea {
        height: 120px;
        resize: vertical;
        font-family: inherit;
    }

    /* Indicador de progresso */
    .progress-bar {
        width: 100%;
        height: 4px;
        background-color: var(--border-color);
        border-radius: 2px;
        margin-bottom: 20px;
        overflow: hidden;
    }

    .progress-fill {
        height: 100%;
        background-color: var(--btn-primary);
        width: 0%;
        transition: width 0.3s ease;
        border-radius: 2px;
    }

    .step-indicator {
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 10px;
    }

    /* Mensagem de erro */
    .erro {
        color: var(--error-color);
        display: none;
        margin-top: -10px;
        margin-bottom: 15px;
        font-size: 14px;
        font-weight: 500;
    }

    /* Classes de controle de visibilidade */
    .email-box, .categorias, .assedio-box, .aluno-box,
    .professor-box, .tecnico-box, .infra-box, .outros-box {
        display: none;
    }

    /* Foco visível para acessibilidade */
    *:focus-visible {
        outline: 3px solid var(--btn-primary);
        outline-offset: 2px;
    }

    /* Responsividade */
    @media (max-width: 600px) {
        .container {
            padding: 20px;
        }
        h1 {
            font-size: 32px;
        }
        .btn {
            font-size: 16px;
            padding: 12px;
        }
        .theme-toggle {
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            font-size: 16px;
        }
    }
</style>
